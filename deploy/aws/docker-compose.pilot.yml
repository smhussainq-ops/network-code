services:
  netcode:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8095:8095"
    env_file:
      - ./netcode.env.example
    volumes:
      - netcode-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  netcode-data:
