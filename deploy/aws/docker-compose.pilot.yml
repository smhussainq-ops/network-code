services:
  netcode:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8095:8095"
    env_file:
      - ./netcode.env
    volumes:
      - netcode-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; h=(os.getenv('NETCODE_ALLOWED_HOSTS','localhost').split(',')[0].strip() or 'localhost'); q=urllib.request.Request('http://127.0.0.1:8095/api/ready',headers={'Host':h}); urllib.request.urlopen(q,timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  netcode-data:
